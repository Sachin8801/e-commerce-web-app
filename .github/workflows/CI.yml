name: CI Pipeline For Test,Build and Push

on:
  workflow_dispatch:
    inputs:
      run_pipeline:
        description: "Run full CI pipeline?"
        required: true
        default: "yes"
        type: choice
        options:
          - yes
          - no
env:
  IMAGE_NAME: easyshop

jobs:

  # 🔹 1. Lint (fast feedback)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: npm ci
      - name: Run lint
        run: npm run lint || echo "No lint configured"

  # 🔹 2. Test + Dependency Scan
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests found"
         # 🔐 Dependency scan
      - name: npm audit
        run: npm audit --audit-level=high || true  

  # 🔹 3. Secret Scan
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

        
  # 🔹 4. Build Image
  build:
    runs-on: ubuntu-latest
    needs: [lint, test, secrets-scan]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

  # 🔹 5. Image Security Scan
  image-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build image again (isolated job)
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: 0   # 🔥 change to 1 later
          severity: CRITICAL,HIGH
          
  # 🔹 6. Integration Test
  integration:
    runs-on: ubuntu-latest
    needs: build

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Build image again (isolated job)
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run container
        run: |
          docker run -d -p 3000:3000 \
            -e MONGODB_URI=mongodb://localhost:27017/easyshop \
            --name test-container \
            $IMAGE_NAME:${{ github.sha }}

          sleep 15

      - name: Health check
        run: |
          curl -f http://localhost:3000 || (docker logs test-container && exit 1)

      - name: Cleanup
        run: docker rm -f test-container

  # 🔹 5. Push to Docker Hub
  push:
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/easyshop:${{ github.sha }} .
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/easyshop:${{ github.sha }} \
                     ${{ vars.DOCKERHUB_USERNAME }}/easyshop:latest

      - name: Push image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/easyshop:${{ github.sha }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/easyshop:latest

      - name: Update GitOps repo with new image
        run: |
        # Setup SSH
          mkdir -p ~/.ssh
          echo "${{ secrets.GITOPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          ssh-keyscan github.com >> ~/.ssh/known_hosts

    # Clone using SSH
          git clone git@github.com:Sachin8801/gitops-repo.git gitops-repo

          cd gitops-repo

    # Debug (remove later)
          ls -R

    # Navigate to correct path (FIX THIS IF NEEDED)
          cd helm/ecommerce

    # Update Helm values
          sed -i "s/tag:.*/tag: ${GITHUB_SHA}/" values.yaml

    # Git config
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Update image tag to ${GITHUB_SHA}" || echo "No changes"

          git pull --rebase origin main
          git push
