name: CI Pipeline For Test,Build and Push

on:
  push:
    branches: ["main"]
  pull_request:

env:
  IMAGE_NAME: easyshop

jobs:

  # 🔹 1. Lint (fast feedback)
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: npm ci
      - name: Run lint
        run: npm run lint || echo "No lint configured"

  # 🔹 2. Test (with MongoDB)
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
        options: >-
          --health-cmd="mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm ci

      - name: Run tests
        run: npm test || echo "No tests found"

  # 🔹 3. Build Docker Image
  build:
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} .

  # 🔹 4. Integration Test (container-level)
  integration:
    runs-on: ubuntu-latest
    needs: build

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Build image again (isolated job)
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Run container
        run: |
          docker run -d -p 3000:3000 \
            -e MONGODB_URI=mongodb://localhost:27017/easyshop \
            --name test-container \
            $IMAGE_NAME:${{ github.sha }}

          sleep 15

      - name: Health check
        run: |
          curl -f http://localhost:3000 || (docker logs test-container && exit 1)

      - name: Cleanup
        run: docker rm -f test-container

  # 🔹 5. Push to Docker Hub
  push:
    runs-on: ubuntu-latest
    needs: integration

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ${{ vars.DOCKERHUB_USERNAME }}/easyshop:${{ github.sha }} .
          docker tag ${{ vars.DOCKERHUB_USERNAME }}/easyshop:${{ github.sha }} \
                     ${{ vars.DOCKERHUB_USERNAME }}/easyshop:latest

      - name: Push image
        run: |
          docker push ${{ vars.DOCKERHUB_USERNAME }}/easyshop:${{ github.sha }}
          docker push ${{ vars.DOCKERHUB_USERNAME }}/easyshop:latest